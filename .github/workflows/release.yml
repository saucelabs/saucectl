name: Release

on:
  push:
    tags:
      - v*

env:
  GH_TOKEN: ${{secrets.GH_TOKEN}}
  SEGMENT_WRITE_KEY: ${{secrets.SEGMENT_WRITE_KEY}}

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      QUILL_SIGN_P12: ${{ secrets.QUILL_SIGN_P12 }}
      QUILL_SIGN_PASSWORD: ${{ secrets.QUILL_SIGN_PASSWORD }}
      QUILL_NOTARY_KEY: ${{ secrets.QUILL_NOTARY_KEY }}
      QUILL_NOTARY_KEY_ID: ${{ secrets.QUILL_NOTARY_KEY_ID }}
      QUILL_NOTARY_ISSUER: ${{ secrets.QUILL_NOTARY_ISSUER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unshallow
        run: |
          git fetch --prune --unshallow

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Quill
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/quill/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  node-release:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref, '-') }}
    steps:
      - name: Trigger node-saucectl Release
        run: |
          version=$(echo $GITHUB_REF_NAME | cut -c2-)
          echo "Release saucectl $version"
          curl -X POST https://api.github.com/repos/saucelabs/node-saucectl/dispatches \
          -H 'Accept: application/vnd.github.everest-preview+json' \
          -u devx-sauce-bot:$GH_TOKEN \
          --data "{\"event_type\": \"saucectl_release\", \"client_payload\": { \"version\": \"$version\" }}"
